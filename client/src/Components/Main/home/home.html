<app-loading *ngIf="loading"></app-loading>

<div class="app" [class.open]="opened">
    <div class="header" [class.open]="opened">
        <button type="button" title="sidebar" class="bt-t sidebar-btn" *ngIf="opened==false" (click)="toggleSidebar()">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#473224"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h320v-560H200v560Zm560 0v-560H600v560h160Z"/></svg>
        </button>

        <div class="brand-font logo-sm logo">The Love Club</div>
    </div>

    <div class="chat-container" #messagesContainer>
        <div class="brand-font empty-chat" *ngIf="messages.length==0" [class.open]="opened">
            Need some relationship advice?
        </div>
        <div class="messages" *ngIf="messages.length > 0" [class.open]="opened">
            <div 
                *ngFor="let msg of messages; trackBy: trackById" 
                [class.user]="msg.role === 'user'" 
                [class.assistant]="msg.role === 'assistant'" 
                >
                    {{ msg.content }}
            </div>
        </div>
    </div>

    <div class="input-wrapper" [class.open]="opened">
        <div contenteditable="true" class="input" data-placeholder="Ask anything"></div>
        <button type="button" title="send" class="bt-t send" (click)="sendMessage(currentConversationId)">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff"><path d="M440-160v-487L216-423l-56-57 320-320 320 320-56 57-224-224v487h-80Z"/></svg>
            <!-- <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#473224"><path d="M120-160v-640l760 320-760 320Zm80-120 474-200-474-200v140l240 60-240 60v140Zm0 0v-400 400Z"/></svg> -->
        </button>
    </div>
</div>


<div class="sidebar" [class.open]="opened">
    <div>
        <button type="button" title="sidebar" class="bt-t sidebar-btn" [class.open]="opened" (click)="toggleSidebar()">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#473224"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h320v-560H200v560Zm560 0v-560H600v560h160Z"/></svg>
        </button>
    </div>


    <div class="sidebar-content">
        <div class="chat-menu">
            <div class="new-chat">
                <button class="bt-t" (click)="selectChat(null)">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#473224"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h357l-80 80H200v560h560v-278l80-80v358q0 33-23.5 56.5T760-120H200Zm280-360ZM360-360v-170l367-367q12-12 27-18t30-6q16 0 30.5 6t26.5 18l56 57q11 12 17 26.5t6 29.5q0 15-5.5 29.5T897-728L530-360H360Zm481-424-56-56 56 56ZM440-440h56l232-232-28-28-29-28-231 231v57Zm260-260-29-28 29 28 28 28-28-28Z"/></svg> 
                    New Chat
                </button>
            </div>
        </div>
        

        <div class="h2">
            Your chats
            <button type="button" title="view-chats" class="bt-t" (click)="toggleChats()">
                <svg *ngIf="closed"  xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#BBB7AB"><path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/></svg>
                <svg *ngIf="closed==false"class="right" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#BBB7AB"><path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/></svg>
            </button>
            
        </div>
        

        <div *ngIf="closed" class="chats">
            
            <div *ngFor="let chat of chats" class="chat"                 [class.active]="chat.id === currentConversationId">
                <button class="bt-t" (click)="selectChat(chat.id)">
                    {{ chat.title }}
                </button>

                <button class="bt-t" title="actions">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#"><path d="M240-400q-33 0-56.5-23.5T160-480q0-33 23.5-56.5T240-560q33 0 56.5 23.5T320-480q0 33-23.5 56.5T240-400Zm240 0q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm240 0q-33 0-56.5-23.5T640-480q0-33 23.5-56.5T720-560q33 0 56.5 23.5T800-480q0 33-23.5 56.5T720-400Z"/></svg>
                </button>
                <!-- <div class="actions-container">
                    <button type="submit" title="delete" class="bt-t">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#EA3323"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
                            Delete
                    </button>     
                </div> -->
                
            </div>

            <!-- <button class="bt-t">New Conversation +</button> -->
        </div>
    </div>


    <div>
        <button type="button" title="sign-out" class="bt-t sign-out" (click)="signOut()">
            <svg class="icon-hover" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#473224">
                <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/>
            </svg>
        
            <svg class="icon-default" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#BBB7AB">
                <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/>
            </svg>
        </button>
    </div>
</div>
